  geojson_vi: ^2.2.5
  http: ^1.6.0
  image_cropper: ^12.2.1
  image_picker: ^1.0.4
  intl: ^0.20.2
  markdown: ^7.0.0
  mime: ^2.0.0
  photo_view: ^0.15.0
  provider: ^6.0.1
  quiver: ^3.0.0
  share_plus: 13.1.0
  shared_preferences: ^2.0.5
  timeago: ^3.3.0
  transparent_image: ^2.0.0
