name: insporation
description: A native diaspora* client
version: 1.2.0+1
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_badge_plus: ^1.2.10
  carousel_slider: ^5.1.2
  catcher_2: ^2.1.9
  collection: ^1.18.0
  expand_widget: ^3.1.1
  flutter_html: ^3.0.0
  flutter_image_compress: ^2.4.0
  flutter_plugin_android_lifecycle: ^2.0.24
