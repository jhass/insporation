name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  repository_dispatch:
    types: [release]
  workflow_dispatch:

concurrency:
  group: build-number
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  determine-build-number:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      value: ${{ steps.build_number.outputs.value }}
    steps:
    - name: Determine shared build number
      id: build_number
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        nightly=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/nightly.yml/runs?status=completed&per_page=1" --jq '.workflow_runs[0].run_number')
        release=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?status=completed&per_page=1" --jq '.workflow_runs[0].run_number')
        next=$((nightly + release + 1))
        echo "value=$next" >> "$GITHUB_OUTPUT"
  build-android:
    needs: determine-build-number
    runs-on: ubuntu-latest
    environment: release-build
    container:
      image: cimg/android:2026.03.1-node
      options: -u root
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/insporation.jks
    steps:
    - name: "Install SDK 36 build tools"
      run: sdkmanager "build-tools;36.0.0"
    - uses: actions/checkout@v7
    - uses: subosito/flutter-action@v2
      id: flutter-action
      with:
        flutter-version: '3.41.x'
        channel: stable
    - name: Workaround flutter directory permissions
      run: |-
        git config --global --add safe.directory ${{ steps.flutter-action.outputs.CACHE-PATH }}
        git config --global --add safe.directory ${{ steps.flutter-action.outputs.CACHE-PATH }}/flutter
        git config --global --add safe.directory $(pwd)
    - name: Setup keystore
      run: |
       echo "$KEYSTORE" | base64 -d > "$KEYSTORE_PATH"
      env:
        KEYSTORE: ${{ secrets.KEYSTORE }}
    - name: Build
      run: |
        BUILD_COMMIT="$(git rev-parse HEAD)"
        BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        flutter build apk --release --build-number=${{ needs.determine-build-number.outputs.value }} --dart-define=BUILD_COMMIT=$BUILD_COMMIT --dart-define=BUILD_DATE=$BUILD_DATE
        flutter build appbundle --release --build-number=${{ needs.determine-build-number.outputs.value }} --dart-define=BUILD_COMMIT=$BUILD_COMMIT --dart-define=BUILD_DATE=$BUILD_DATE
        mkdir -p dist
        cp build/app/outputs/apk/release/app-release.apk dist/insporation-$(git describe --tags 2>/dev/null || echo ${{ needs.determine-build-number.outputs.value }}).apk
        cp build/app/outputs/bundle/release/app-release.aab dist/insporation-$(git describe --tags 2>/dev/null || echo ${{ needs.determine-build-number.outputs.value }}).aab
        git rev-parse HEAD > dist/BUILD_SHA
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYSTORE_KEY_ALIAS: key
    - uses: actions/upload-artifact@v7
      with:
        name: Android Application bundles
        path: dist
  publish-android-fdroid:
    needs: [build-android, determine-build-number]
    runs-on: ubuntu-latest
    environment: release-build
    permissions:
      contents: write
      actions: write
    container:
      image: registry.gitlab.com/fdroid/docker-executable-fdroidserver:master
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/insporation.jks
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: Android Application bundles
        path: dist
    - uses: softprops/action-gh-release@v3
      with:
        working_directory: dist
        files: '*'
    - name: Checkout F-Droid repository
      uses: actions/checkout@v7
      with:
        ref: gh-pages
        path: pages
    - name: Setup keystore
      run: |
       echo "$KEYSTORE" | base64 -d > "$KEYSTORE_PATH"
      env:
        KEYSTORE: ${{ secrets.KEYSTORE }}
    - name: Update F-Droid repository
      run: |
        . /etc/profile.d/bsenv.sh

        cd pages

        git config --local user.email "me+release-ci@jhass.eu"
        git config --local user.name  "Github Actions Release Job"

        # Truncate history
        git checkout --orphan new-pages
        git commit -m "Import previous state"

        cd fdroid

        # Add new build
        cp ../../dist/*.apk repo/

        # Cleanup archive
        find archive -name '*.apk' | sort -V | head -n-2 | xargs -r rm

        # Rebuild repos
        ${fdroidserver}/fdroid update

        # Cleanup icons
        for icon in {repo,archive}/icons/*.*.png; do
          repo="$(dirname "$(dirname "$icon")")"
          base="$(basename "$icon" .png)"
          build="$(echo "$base" | tr -Cd '0-9')"
          if [ ! -e "$repo/insporation-$build.apk" ]; then
            rm $repo/icons*/$base.{png,xml} || echo "No icons for $repo/$base.apk present"
          fi
        done

        # Publish
        git add .
        git commit -m "Update fdroid repository for build $BUILD_NUMBER"
        git push -f "https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git" new-pages:gh-pages
      shell: bash
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYSTORE_KEY_ALIAS: key
        BUILD_NUMBER: ${{ needs.determine-build-number.outputs.value }}
    - name: Trigger Github Pages deploy
      uses: benc-uk/workflow-dispatch@v1
      with:
        workflow: pages.yml
        ref: gh-pages
  publish-android-playstore:
    needs: build-android
    runs-on: ubuntu-latest
    environment: release-build
    permissions:
      id-token: 'write'
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
    - uses: actions/checkout@v7
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: true
    - uses: actions/download-artifact@v8
      with:
        name: Android Application bundles
        path: dist
    - uses: 'google-github-actions/auth@v3'
      with:
        service_account: "fastlane@insporation.iam.gserviceaccount.com"
        workload_identity_provider: "projects/111601323342/locations/global/workloadIdentityPools/insporation-github-actions/providers/github"
    - name: Publish to Play Store
      run: |
        cd android
        bundle config set deployment 'true'
        bundle
        bundle exec fastlane supply --aab ../dist/*.aab --track internal
  publish-ios:
    needs: determine-build-number
    runs-on: macos-latest
    environment: release-build
    steps:
    - uses: actions/checkout@v7
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Install iOS SDK
      run: |
        xcrun simctl list > /dev/null # https://github.com/actions/runner-images/issues/13459
        xcodebuild -downloadPlatform iOS
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.x'
        channel: stable
    - name: Build
      run: |
        BUILD_COMMIT="$(git rev-parse HEAD)"
        BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        flutter build ios --release --no-codesign --build-number=${{ needs.determine-build-number.outputs.value }} --dart-define=BUILD_COMMIT=$BUILD_COMMIT --dart-define=BUILD_DATE=$BUILD_DATE
        cd ios
        bundle config set deployment 'true'
        bundle
        bundle exec fastlane beta
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
        APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
