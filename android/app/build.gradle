import com.android.build.gradle.internal.api.ApkVariantOutputImpl

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Official F-Droid builds pass fdroidAbiSplit=true alongside Flutter's --split-per-abi.
def fdroidAbiSplit = project.findProperty('fdroidAbiSplit')?.toString() == 'true'
def fdroidAbiCodes = [
        'armeabi-v7a': 1,
        'arm64-v8a'  : 2,
        'x86_64'     : 3,
]

android {
    namespace 'jhass.eu.insporation'

    compileSdk 36
    ndkVersion "28.2.13676358"

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "jhass.eu.insporation"
        minSdkVersion 26
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        manifestPlaceholders += [
                'appAuthRedirectScheme': 'eu.jhass.insporation'
        ]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            keyAlias getenv("KEYSTORE_KEY_ALIAS", "key")
            keyPassword getenv("KEYSTORE_PASSWORD", null)
            storeFile file(getenv("KEYSTORE_PATH", "insporation.jks"))
            storePassword getenv("KEYSTORE_PASSWORD", null)
        }
    }

    buildTypes {
        release {
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard.txt'
            signingConfig signingConfigs.release
        }

        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    lint {
        disable 'InvalidPackage'
    }
}

android.applicationVariants.configureEach { variant ->
    if (!fdroidAbiSplit || variant.buildType.name != 'release') {
        return
    }

    variant.outputs.each { output ->
        def abiFilter = output.filters.find { filter ->
            filter.filterType.toString() == 'ABI'
        }
        def abiVersionCode = abiFilter == null ? null : fdroidAbiCodes[abiFilter.identifier]

        if (abiVersionCode != null) {
            (output as ApkVariantOutputImpl).versionCodeOverride = variant.versionCode * 10 + abiVersionCode
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0'
    implementation 'net.openid:appauth:0.8.1'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

static def getenv(key, defaultValue) {
    return System.getenv(key) ? System.getenv(key) : defaultValue
}
